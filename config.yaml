# =================================================================
# AI Video Summary - Unified Configuration
# =================================================================
# This file centralizes all settings for the Video-to-Blog pipeline.
# All fields are optional; defaults will be used if a field is omitted.

# -----------------------------------------------------------------
# 1. VLM (Vision-Language Model) Settings
# Used for: OCR, slide validation, semantic deduplication, and captions.
# -----------------------------------------------------------------
vlm:
  # API endpoint for the VLM (must be OpenAI-compatible).
  base_url: "htts://"

  # The specific model name to use for visual tasks.
  model: ""

# -----------------------------------------------------------------
# 2. ASR (Automatic Speech Recognition) Settings
# Used for: Transcribing audio to text with hot-word boosting.
# -----------------------------------------------------------------
asr:
  # For local mode: model size (base, small, medium, large-v3).
  # For API mode: the specific model name (e.g., 'whisper-1').
  model_size: "base"

  # If null, the pipeline runs ASR locally using Faster-Whisper.
  # If provided, it uses an OpenAI-compatible ASR API.
  api_base: null

  # Device for local transcription ('cpu' or 'cuda' for NVIDIA GPUs).
  local_device: "cpu"

  # Quantization level for local mode ('int8', 'float16', 'default').
  # 'int8' is faster and uses less memory on CPU.
  local_compute_type: "int8"

# -----------------------------------------------------------------
# 3. CV (Computer Vision) Settings
# Used for: Fast frame difference detection to identify slide changes.
# -----------------------------------------------------------------
cv:
  # Threshold for Mean Squared Error (MSE).
  # Increase this if the system detects too many false slide changes.
  # Decrease it if it misses slide changes.
  diff_threshold: 850

  # Internal resolution used for comparing frames.
  # Smaller sizes result in faster processing. [width, height].
  target_size: [256, 144]

# -----------------------------------------------------------------
# 4. Project Context (ASR Boosting & Metadata)
# These fields provide background to the AI and improve ASR accuracy.
# -----------------------------------------------------------------
context:
  # Title of the meeting/video (used in the final report header).
  meeting_title: ""

  # Date of the event.
  date: ""

  # Location or platform where the event took place.
  location: ""

  # List of speakers or attendees.
  attendees:

  # Key topics covered. The items are used to prime the ASR.
  agenda:

  # CRITICAL: Project-specific technical terms.
  # These are injected into the ASR 'initial_prompt' to prevent misspellings.
  custom_terms:
