# =================================================================
# AI Video Summary - Project Context (会议元数据)
# =================================================================
# 此文件仅存放与具体视频/会议相关的项目上下文，可安全纳入版本控制。
# API 地址、模型名、密钥等部署配置请在 .env 文件中设置（参考 .env.example）。
# =================================================================

context:
  # 视频/会议标题（用于最终报告标题）
  meeting_title: ""

  # 活动日期
  date: ""

  # 地点或平台
  location: ""

  # 发言人 / 出席者列表
  attendees:
    # - "主讲人"
    # - "听众"

  # 主要议题（前几条会注入 ASR 引导词）
  agenda:
    # - "第一章：简介"
    # - "第二章：实践"

  # ⚠️ 关键：项目专属技术术语
  # 这些词汇会被注入 ASR initial_prompt，显著减少专业词汇识别错误。
  custom_terms:
    # - "AURIX"
    # - "TriCore"
    # - "DMA"
